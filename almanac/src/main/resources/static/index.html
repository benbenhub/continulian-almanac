<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>命理文化网 - 传统八字排盘</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="nav-container">
            <div class="logo">
                <h1>命理文化</h1>
            </div>
            <nav class="nav-menu">
                <ul>
                    <li><a href="#" class="active">首页</a></li>
                    <li><a href="/bazi.html">八字排盘</a></li>
                    <li><a href="#">命理知识</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="content-container">
            <aside class="left-sidebar">
                <div class="fortune-motto">
                    <div class="motto-content">
                        <p class="vertical-line">一命二运三风水</p>
                        <p class="vertical-line">四积阴德五读书</p>
                    </div>
                </div>
            </aside>

            <section class="center-core">
                <div class="motto-section">
                    <h2 class="main-motto">心正易则精，德正艺始高</h2>
                </div>

                <div class="clock-section">
                    <div class="flip-clock-wrap" aria-label="北京时间">
                        <div class="flip-clock">
                            <div class="flip-card" id="flip-h1"><div class="flip-card-inner"><div class="flip-face flip-front">0</div><div class="flip-face flip-back">0</div></div></div>
                            <div class="flip-card" id="flip-h2"><div class="flip-card-inner"><div class="flip-face flip-front">0</div><div class="flip-face flip-back">0</div></div></div>
                            <div class="flip-sep">:</div>
                            <div class="flip-card" id="flip-m1"><div class="flip-card-inner"><div class="flip-face flip-front">0</div><div class="flip-face flip-back">0</div></div></div>
                            <div class="flip-card" id="flip-m2"><div class="flip-card-inner"><div class="flip-face flip-front">0</div><div class="flip-face flip-back">0</div></div></div>
                            <div class="flip-sep">:</div>
                            <div class="flip-card" id="flip-s1"><div class="flip-card-inner"><div class="flip-face flip-front">0</div><div class="flip-face flip-back">0</div></div></div>
                            <div class="flip-card" id="flip-s2"><div class="flip-card-inner"><div class="flip-face flip-front">0</div><div class="flip-face flip-back">0</div></div></div>
                        </div>
                        <div class="flip-date" id="beijing-time"></div>
                    </div>
                </div>

                <div class="calc-grid home-calc-grid" id="home-calc">
                    <section class="calc-card">
                        <h3 class="calc-card-title">农历信息</h3>
                        <div class="calc-list" id="home-lunar"></div>
                    </section>

                    <section class="calc-card">
                        <h3 class="calc-card-title">今日黄历</h3>
                        <div class="calc-list" id="home-almanac"></div>
                    </section>
                </div>
            </section>

            <aside class="right-sidebar">
                <div class="fortune-motto">
                    <div class="motto-content">
                        <p class="vertical-line">六名七相八敬神</p>
                        <p class="vertical-line">九交贵人十养生</p>
                    </div>
                </div>
            </aside>
        </div>

        <section class="bottom-poetry">
            <div class="bottom-poetry-inner">
                <p class="bottom-poetry-text">一物从来有一身，一身还有一乾坤，能知万物备於我，肯把三才别立根，天向一中分体用，人于心上起经纶，天人焉有两般义，道不虚行只在人</p>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
